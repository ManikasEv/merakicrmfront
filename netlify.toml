[build]
  command   = "npm run build"
  publish   = "dist"

# Proxy API calls through Netlify (no CORS, backend URL not exposed in bundle).
[[redirects]]
  from = "/api/*"
  to = "https://merakibackend.vercel.app/api/:splat"
  status = 200
  force = true

# Redirect all routes to index.html so React Router works on hard refresh
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
